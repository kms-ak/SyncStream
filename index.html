<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // TELEPARTY_PRO</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #0a0a0f; 
            --panel: #12121a; 
            --border: #1f1f2e; 
            --text: #e0e0e6; 
            --error: #ff4d4d;
            --chat-bg: #0d0d14;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Auth UI Overlay */
        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 1px solid var(--neon); padding: 40px; width: 90%; max-width: 400px; background: var(--panel); text-align: center; box-shadow: 0 0 30px rgba(0,242,255,0.1); border-radius: 8px; }
        
        header { 
            height: 60px;
            padding: 0 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--panel);
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 2px; font-size: 0.7rem; }
        
        /* Main Workspace */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Video Section */
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        #player-container { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border); 
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; }

        /* Chat Sidebar */
        .chat-sidebar {
            width: 350px;
            background: var(--chat-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--neon);
            text-transform: uppercase;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { font-size: 0.85rem; line-height: 1.4; word-wrap: break-word; }
        .msg-user { color: var(--neon); font-weight: bold; margin-right: 5px; }
        .msg-system { color: #666; font-style: italic; font-size: 0.75rem; text-align: center; margin: 8px 0; }
        
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        /* Controls */
        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 10px; 
            border-radius: 4px; 
            outline: none;
            font-family: 'Fira Code', monospace;
        }
        input:focus { border-color: var(--neon); }
        .btn { 
            padding: 10px 20px; 
            background: transparent; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            cursor: pointer; 
            font-weight: bold;
            font-size: 0.7rem;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--neon); color: #000; }
        .btn-red { border-color: var(--error); color: var(--error); }
        .btn-red:hover { background: var(--error); color: #fff; }
        
        .sync-btns { display: flex; gap: 10px; margin-top: 15px; }

        .status-pill { font-size: 0.6rem; padding: 2px 8px; border: 1px solid #333; border-radius: 10px; }
        .online { color: var(--neon); border-color: var(--neon); }

        @media (max-width: 800px) {
            .app-container { flex-direction: column; }
            .chat-sidebar { width: 100%; height: 300px; }
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:20px; font-family: 'Syncopate'; font-size: 0.9rem;">TELEPARTY_JOIN</h2>
        <input type="text" id="user-id" placeholder="USERNAME" style="width:100%; margin-bottom:15px;">
        <input type="text" id="room-id" placeholder="ROOM_CODE" style="width:100%; margin-bottom:15px;">
        <button class="btn" style="width:100%" onclick="app.init()">ENTER_LOBBY</button>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // TELEPARTY</div>
    <div id="connection-status" class="status-pill">OFFLINE</div>
</header>

<div class="app-container">
    <div class="video-section">
        <div class="input-group" style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="manual-url" placeholder="Paste YouTube link to sync movie..." style="flex:1">
            <button class="btn" onclick="app.loadManualUrl()">SYNC_MOVIE</button>
        </div>

        <div id="player-container">
            <div class="video-wrapper">
                <div id="yt-player"></div>
            </div>
        </div>

        <div class="sync-btns" id="global-controls" style="display:none;">
            <button class="btn" onclick="app.emitSync('PLAY')">PLAY FOR ALL</button>
            <button class="btn btn-red" onclick="app.emitSync('PAUSE')">PAUSE FOR ALL</button>
        </div>
    </div>

    <div class="chat-sidebar">
        <div class="chat-header">Party Chat</div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Say something..." style="flex:1" onkeydown="if(event.key==='Enter')app.sendChat()">
            <button class="btn" onclick="app.sendChat()">SEND</button>
        </div>
    </div>
</div>

<script>
    const KEYS = { ABLY: '%%ABLY_KEY%%' };

    let player;
    const app = {
        config: { user: '', room: '', channel: null },

        init() {
            const u = document.getElementById('user-id').value.trim();
            const r = document.getElementById('room-id').value.trim();
            if(!u || !r) return alert("Username and Room Code required.");
            
            this.config.user = u;
            this.config.room = r.toUpperCase();
            document.getElementById('auth-overlay').style.display = 'none';
            this.initAbly();
        },

        initAbly() {
            if (!KEYS.ABLY || KEYS.ABLY.startsWith('%%')) {
                this.systemMessage("Ably Key Missing: Offline Mode");
                return;
            }

            try {
                const ably = new Ably.Realtime({ key: KEYS.ABLY });
                ably.connection.on('connected', () => {
                    this.config.channel = ably.channels.get(`party_${this.config.room}`);
                    
                    const status = document.getElementById('connection-status');
                    status.innerText = `CONNECTED: ${this.config.room}`;
                    status.className = 'status-pill online';

                    this.config.channel.subscribe('event', (msg) => this.handleEvent(msg.data));
                    
                    this.systemMessage(`Welcome to the party, ${this.config.user}!`);
                    this.config.channel.publish('event', { type: 'SYSTEM', msg: `${this.config.user} joined the chat.` });
                    
                    // Late joiner logic: Ask others what is playing
                    setTimeout(() => this.emitSync('ASK_STATUS'), 1500);
                });
            } catch (e) {
                console.error("Ably failure:", e);
                this.systemMessage("Connection error.");
            }
        },

        loadManualUrl() {
            const val = document.getElementById('manual-url').value;
            const id = this.extractId(val);
            if(id) {
                this.playVideo(id, true);
            } else {
                alert("Please provide a valid YouTube URL.");
            }
        },

        extractId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        },

        playVideo(id, broadcast = false, startTime = 0) {
            document.getElementById('player-container').style.display = 'block';
            document.getElementById('global-controls').style.display = 'flex';
            
            if (!player) {
                player = new YT.Player('yt-player', {
                    height: '100%', width: '100%', videoId: id,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'start': Math.floor(startTime), 'modestbranding': 1 }
                });
            } else {
                player.loadVideoById({ videoId: id, startSeconds: startTime });
            }

            if (broadcast) this.emitSync('LOAD', id);
        },

        sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg || !this.config.channel) return;
            
            this.config.channel.publish('event', { 
                type: 'CHAT', 
                user: this.config.user, 
                msg: msg 
            });
            input.value = '';
        },

        systemMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg-system';
            div.innerText = text;
            const box = document.getElementById('chat-messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        },

        emitSync(type, data = null) {
            if (!this.config.channel) return;
            
            const payload = {
                type, 
                sender: this.config.user,
                time: player ? player.getCurrentTime() : 0,
                videoId: data || (player ? player.getVideoData().video_id : null)
            };
            
            this.config.channel.publish('event', payload);
        },

        handleEvent(data) {
            // Global messages (Chat/System)
            if(data.type === 'CHAT') {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<span class="msg-user">${data.user}:</span> ${data.msg}`;
                const box = document.getElementById('chat-messages');
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
                return;
            }

            if(data.type === 'SYSTEM') return this.systemMessage(data.msg);

            // Synchronization Logic
            switch(data.type) {
                case 'ASK_STATUS':
                    // If someone joins and we are watching something, tell them
                    if(data.sender !== this.config.user && player && player.getVideoData().video_id) {
                        this.emitSync('GIVE_STATUS');
                    }
                    break;

                case 'GIVE_STATUS':
                    // We just joined and someone responded with the current movie state
                    if(data.sender !== this.config.user) {
                        const currentId = player ? player.getVideoData().video_id : null;
                        if(currentId !== data.videoId) {
                            this.playVideo(data.videoId, false, data.time);
                        }
                    }
                    break;

                case 'LOAD':
                    if(data.sender !== this.config.user) {
                        this.playVideo(data.videoId, false);
                    }
                    break;

                case 'PLAY':
                    // Fixed: Apply to everyone including sender to ensure exact sync
                    if(player) {
                        player.seekTo(data.time, true);
                        player.playVideo();
                    }
                    break;

                case 'PAUSE':
                    // Fixed: Apply to everyone including sender
                    if(player) {
                        player.pauseVideo();
                        player.seekTo(data.time, true);
                    }
                    break;
            }
        }
    };

    // YouTube API Initialization
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    function onYouTubeIframeAPIReady() { console.log("Youtube System Online"); }
</script>
</body>
</html>
