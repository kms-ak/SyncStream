<div class="container">
    <div class="main-panel">
        <div class="card">
            <h4 style="color:var(--primary); text-transform:uppercase; font-size:0.7rem;">Search Free Movies</h4>
            <div style="display:flex; gap:10px;">
                <input type="text" id="movie-search" placeholder="Search for 'Full Movie'...">
                <button class="btn" style="width:auto" onclick="app.searchMovies()">Search</button>
            </div>
            <div id="movie-results" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:1rem;"></div>
        </div>

        <div id="player-card" class="card" style="display:none; padding:0; overflow:hidden;">
            <div id="yt-player"></div> <div style="padding:1rem; display:flex; gap:10px; background:var(--surface);">
                <button class="btn" onclick="app.sendSync('PLAY')">▶ Sync Play</button>
                <button class="btn" style="background:#334155; color:white;" onclick="app.sendSync('PAUSE')">⏸ Sync Pause</button>
            </div>
        </div>
    </div>
    </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const CONFIG = {
        ABLY_KEY: "%%ABLY_KEY%%",
        YOUTUBE_KEY: "%%YOUTUBE_KEY%%"
    };

    let ytPlayer;
    // This function is required by YouTube's API
    function onYouTubeIframeAPIReady() {
        // Player will be initialized when a movie is selected
    }

    const app = {
        // ... previous state and init code ...

        async searchMovies() {
            const q = document.getElementById('movie-search').value;
            // We append "full movie" to help find playable content
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}+full+movie&type=video&videoEmbeddable=true&maxResults=4&key=${CONFIG.YOUTUBE_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            
            const container = document.getElementById('movie-results');
            container.innerHTML = '';
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card'; div.style.cursor = 'pointer';
                div.innerHTML = `<img src="${item.snippet.thumbnails.medium.url}" style="width:100%; border-radius:4px;"><p style="font-size:0.8rem; margin-top:5px;">${item.snippet.title}</p>`;
                div.onclick = () => this.loadVideo(item.id.videoId, item.snippet.title);
                container.appendChild(div);
            });
        },

        loadVideo(videoId, title, isRemote = false) {
            document.getElementById('player-card').style.display = 'block';
            if (!ytPlayer) {
                ytPlayer = new YT.Player('yt-player', {
                    height: '360', width: '100%', videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1 }
                });
            } else {
                ytPlayer.loadVideoById(videoId);
            }
            if (!isRemote) this.state.channel.publish('sync', { action: 'LOAD', videoId, title });
        },

        sendSync(action) {
            const currentTime = ytPlayer.getCurrentTime();
            this.state.channel.publish('sync', { action, time: currentTime });
            if (action === 'PLAY') ytPlayer.playVideo();
            if (action === 'PAUSE') ytPlayer.pauseVideo();
        },

        handleRemote(data) {
            if (data.action === 'LOAD') this.loadVideo(data.videoId, data.title, true);
            if (data.action === 'PLAY') {
                ytPlayer.seekTo(data.time);
                ytPlayer.playVideo();
            }
            if (data.action === 'PAUSE') ytPlayer.pauseVideo();
        }
    };
</script>
