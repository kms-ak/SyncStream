<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // FIRESTORE_V1</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    
    <!-- Plyr & HLS.js -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #050508; 
            --panel: #0a0a0f; 
            --border: #1a1a24; 
            --text: #e0e0e6; 
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH OVERLAY --- */
        #auth-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: 10000; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .auth-card { 
            border: 1px solid var(--border); 
            padding: 40px; 
            width: 90%; 
            max-width: 400px; 
            background: var(--panel); 
            text-align: center; 
            border-radius: 4px; 
        }

        #auth-debug {
            margin-top: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: #555;
            text-align: left;
            background: #000;
            padding: 10px;
            border: 1px solid #111;
            max-height: 120px;
            overflow-y: auto;
        }
        
        /* --- HEADER --- */
        header { 
            height: 60px;
            padding: 0 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 2px; font-size: 0.85rem; }
        
        .header-meta { display: flex; gap: 20px; align-items: center; font-family: 'Syncopate'; font-size: 0.65rem; color: var(--neon); }

        /* --- LAYOUT --- */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        .main-stage { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 30px; 
            position: relative;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #display-viewport {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        #web-frame { width: 100%; height: 100%; border: none; display: none; }
        #player-wrapper { width: 100%; height: 100%; display: none; }

        /* --- OVERLAYS --- */
        #interaction-shield {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        #empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #222;
            font-family: 'Syncopate';
            font-size: 0.8rem;
            pointer-events: none;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 380px; 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg);
        }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .msg { font-size: 0.8rem; font-family: 'Inter'; color: #888; font-style: italic; }
        .msg-user { color: #aaa; margin-right: 8px; font-weight: normal; }

        .chat-input-row { 
            padding: 20px; 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 10px; 
        }
        
        /* --- UI ELEMENTS --- */
        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 2px; 
            outline: none; 
            font-family: 'Inter', sans-serif; 
            font-size: 0.85rem; 
            width: 100%; 
        }
        input:focus { border-color: var(--neon); }
        
        .btn { 
            padding: 10px 20px; 
            background: transparent; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            cursor: pointer; 
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem; 
            border-radius: 4px; 
            transition: all 0.2s; 
            white-space: nowrap;
        }
        .btn:hover { background: rgba(0, 242, 255, 0.1); }
        .btn-red { border-color: #ff3e3e; color: #ff3e3e; }
        .btn-red:hover { background: rgba(255, 62, 62, 0.1); }
        .btn-filled { background: var(--neon); color: #000; }

        .footer-controls {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 20px;
        }

        .control-group { display: flex; gap: 15px; }

        #status-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            display: inline-block;
            margin-right: 5px;
        }
        #status-light.online {
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:25px; font-family: 'Syncopate'; font-size: 0.8rem;">ESTABLISH_CLOUD_UPLINK</h2>
        <input type="text" id="user-id" placeholder="USER_NAME">
        <div style="height:12px;"></div>
        <input type="text" id="room-id" placeholder="ROOM_CODE">
        <div style="height:25px;"></div>
        <button id="init-btn" class="btn btn-filled" style="width:100%">INITIALIZE</button>
        <div id="auth-debug">System ready...</div>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // CLOUD_SYNC</div>
    <div class="header-meta">
        <div style="display: flex; align-items: center;">
            <span id="status-light"></span>
            <div id="room-display">OFFLINE</div>
        </div>
        <button class="btn" style="border-width:1px;" onclick="app.toggleChat()">CHAT</button>
    </div>
</header>

<div class="app-container">
    <div class="main-stage">
        <div class="input-row">
            <input type="text" id="media-url" placeholder="Paste URL (YouTube, Brocoflix, Direct MP4) ...">
            <button class="btn" onclick="app.broadcastLoad()">PUSH_URL</button>
        </div>

        <div id="display-viewport">
            <div id="empty-state">WAITING_FOR_SIGNAL...</div>
            
            <div id="interaction-shield" onclick="app.unmuteAndSync()">
                <button class="btn" style="padding: 15px 30px; font-size: 0.8rem;">ACTIVATE AUDIO & SYNC</button>
            </div>
            
            <div id="player-wrapper">
                <div id="player-mount"></div>
            </div>
            <iframe id="web-frame" allow="autoplay; fullscreen; encrypted-media;"></iframe>
        </div>

        <div class="footer-controls">
            <div class="control-group">
                <button class="btn" onclick="app.updateState({ playing: true })">PLAY</button>
                <button class="btn btn-red" onclick="app.updateState({ playing: false })">PAUSE</button>
                <button class="btn" onclick="app.updateState({ time: player ? player.currentTime : 0 })">SYNC_NOW</button>
            </div>
            <div id="latency-tag" style="font-size: 10px; color: #444; font-family: 'Fira Code';">LATENCY: 0MS</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter')app.sendChat()">
            <button class="btn" onclick="app.sendChat()">SEND</button>
        </div>
    </div>
</div>

<script>
    // Safe initialization logic
    const app = {
        config: { user: '', room: '', uid: '' },
        state: {
            currentUrl: '',
            isPlaying: false,
            isLocalAction: false
        },
        db: null,
        auth: null,

        logDebug(msg) {
            const debugEl = document.getElementById('auth-debug');
            if (debugEl) {
                const time = new Date().toLocaleTimeString().split(' ')[0];
                debugEl.innerHTML += `<div>[${time}] ${msg}</div>`;
                debugEl.scrollTop = debugEl.scrollHeight;
            }
            console.log(`[DEBUG] ${msg}`);
        },

        async init() {
            this.logDebug("Init triggered...");
            
            const u = document.getElementById('user-id').value.trim();
            const r = document.getElementById('room-id').value.trim().toUpperCase();
            
            if(!u || !r) {
                this.logDebug("Error: Name and Room are required.");
                return;
            }

            this.config.user = u;
            this.config.room = r;

            try {
                this.logDebug("Verifying SDK...");
                if (typeof firebase === 'undefined') {
                    throw new Error("SDK Not Loaded. Check connection.");
                }

                if (!this.db) {
                    this.logDebug("Injecting Config...");
                    // THE API KEY IS AUTOMATICALLY PROVIDED HERE BY THE ENVIRONMENT
                    if (typeof __firebase_config === 'undefined') {
                        throw new Error("Cloud config not found. Wait 5s and try again.");
                    }
                    const firebaseConfig = JSON.parse(__firebase_config);
                    firebase.initializeApp(firebaseConfig);
                    this.db = firebase.firestore();
                    this.auth = firebase.auth();
                }

                this.logDebug("Handshaking...");
                const cred = await this.auth.signInAnonymously();
                this.config.uid = cred.user.uid;
                
                this.logDebug("Uplink Established.");
                document.getElementById('auth-overlay').style.display = 'none';
                this.startSession();
            } catch (e) {
                this.logDebug(`FAILED: ${e.message}`);
                console.error(e);
            }
        },

        startSession() {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sync-stream-default';
            const statusLight = document.getElementById('status-light');
            statusLight.classList.add('online');
            document.getElementById('room-display').innerText = `ROOM: ${this.config.room}`;
            this.addSystemMsg(`Connected as ${this.config.user}`);

            this.roomRef = this.db.doc(`artifacts/${appId}/public/data/rooms/${this.config.room}`);
            this.chatRef = this.db.collection(`artifacts/${appId}/public/data/rooms/${this.config.room}/chat`);

            this.roomRef.onSnapshot((doc) => {
                if (doc.exists) this.handleRoomUpdate(doc.data());
            }, (err) => this.addSystemMsg("Sync Error: " + err.message));

            this.chatRef.orderBy('timestamp', 'desc').limit(20).onSnapshot((snap) => {
                snap.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (data.sender !== this.config.user) {
                            this.addChat(data.sender, data.text);
                        }
                    }
                });
            }, (err) => console.error(err));
        },

        handleRoomUpdate(data) {
            if (data.lastSender === this.config.user) return;
            if (data.url && data.url !== this.state.currentUrl) {
                this.loadMedia(data.url, data.time || 0);
            }
            if (player) {
                this.state.isLocalAction = true;
                const now = Date.now();
                const latency = data.serverTime ? (now - data.serverTime) / 1000 : 0;
                const expectedTime = data.playing ? data.time + latency : data.time;
                document.getElementById('latency-tag').innerText = `LATENCY: ${Math.round(latency * 1000)}MS`;
                const diff = Math.abs(player.currentTime - expectedTime);
                if (diff > 2.0) player.currentTime = expectedTime;
                if (data.playing) player.play(); else player.pause();
                setTimeout(() => { this.state.isLocalAction = false; }, 500);
            }
        },

        async updateState(updates) {
            if (this.state.isLocalAction || !this.roomRef) return;
            const newState = {
                url: updates.url || this.state.currentUrl,
                time: updates.time !== undefined ? updates.time : (player ? player.currentTime : 0),
                playing: updates.playing !== undefined ? updates.playing : this.state.isPlaying,
                lastSender: this.config.user,
                serverTime: Date.now()
            };
            try { await this.roomRef.set(newState, { merge: true }); } catch (e) { console.error(e); }
        },

        broadcastLoad() {
            const url = document.getElementById('media-url').value.trim();
            if (!url) return;
            this.updateState({ url, time: 0, playing: true });
            this.loadMedia(url, 0);
        },

        loadMedia(url, startTime) {
            this.state.currentUrl = url;
            document.getElementById('empty-state').style.display = 'none';
            const isYT = url.includes('youtube.com') || url.includes('youtu.be');
            const isDirect = /\.(mp4|m3u8|webm|ts|mkv|mov)$/i.test(url) || url.includes('brocoflix');
            if (isYT || isDirect) {
                document.getElementById('web-frame').style.display = 'none';
                document.getElementById('player-wrapper').style.display = 'block';
                document.getElementById('interaction-shield').style.display = 'flex';
                this.initPlayer(url, isYT, startTime);
            } else {
                document.getElementById('player-wrapper').style.display = 'none';
                document.getElementById('web-frame').style.display = 'block';
                document.getElementById('web-frame').src = url;
            }
        },

        initPlayer(url, isYT, startTime) {
            if (player) player.destroy();
            const mount = document.getElementById('player-mount');
            if (isYT) {
                mount.innerHTML = `<div id="plyr-target" data-plyr-provider="youtube" data-plyr-embed-id="${url}"></div>`;
            } else {
                mount.innerHTML = `<video id="plyr-target" playsinline controls crossorigin muted></video>`;
                const video = mount.querySelector('video');
                if ((url.includes('.m3u8') || url.includes('brocoflix')) && typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                } else { video.src = url; }
            }
            player = new Plyr('#plyr-target', { autoplay: true, muted: true });
            player.on('ready', () => { if(startTime > 0) player.currentTime = startTime; player.play(); });
            player.on('play', () => { 
                this.state.isPlaying = true;
                if(!this.state.isLocalAction) this.updateState({ playing: true }); 
            });
            player.on('pause', () => { 
                this.state.isPlaying = false;
                if(!this.state.isLocalAction) this.updateState({ playing: false }); 
            });
        },

        unmuteAndSync() {
            document.getElementById('interaction-shield').style.display = 'none';
            if (player) { player.muted = false; player.volume = 1; player.play(); }
        },

        sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !this.chatRef) return;
            this.chatRef.add({ sender: this.config.user, text, timestamp: Date.now() });
            this.addChat(this.config.user, text);
            input.value = '';
        },

        addChat(user, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="msg-user">${user}:</span> <span></span>`;
            div.querySelector('span:last-child').textContent = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        addSystemMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.style.color = 'var(--neon)';
            div.textContent = `> ${text}`;
            document.getElementById('chat-messages').appendChild(div);
        },

        toggleChat() {
            const sb = document.getElementById('sidebar');
            sb.style.display = sb.style.display === 'none' ? 'flex' : 'none';
        }
    };

    // Attach listener with extreme prejudice
    window.addEventListener('load', () => {
        app.logDebug("Standby.");
        const btn = document.getElementById('init-btn');
        if (btn) {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                app.init();
            });
        }
    });
</script>

</body>
</html>
