<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // TOTAL_UNIVERSAL</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <!-- Plyr & HLS.js for Universal Support -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #0a0a0f; 
            --panel: #12121a; 
            --border: #1f1f2e; 
            --text: #e0e0e6; 
            --error: #ff4d4d;
            --chat-bg: #0d0d14;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 1px solid var(--neon); padding: 40px; width: 90%; max-width: 400px; background: var(--panel); text-align: center; box-shadow: 0 0 30px rgba(0,242,255,0.1); border-radius: 8px; }
        
        header { 
            height: 60px;
            padding: 0 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--panel);
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 2px; font-size: 0.7rem; }
        
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        .video-section { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; transition: all 0.3s ease; }
        
        #display-viewport {
            width: 100%;
            height: 65vh;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
            display: none;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        #web-frame { width: 100%; height: 100%; border: none; display: none; background: #fff; }
        #player-wrapper { width: 100%; height: 100%; display: none; }

        #interaction-shield {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
            border-radius: 8px;
        }

        .chat-sidebar { width: 350px; background: var(--chat-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .chat-sidebar.collapsed { width: 0; transform: translateX(100%); }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 0.8rem; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; border-left: 2px solid var(--neon); word-break: break-word; }
        .msg-user { color: var(--neon); font-weight: bold; margin-right: 5px; text-transform: uppercase; font-size: 0.7rem; }
        
        .chat-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        input { background: #000; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; outline: none; font-family: 'Fira Code', monospace; font-size: 0.8rem; }
        input:focus { border-color: var(--neon); }
        
        .btn { padding: 10px 20px; background: transparent; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; font-weight: bold; font-size: 0.7rem; border-radius: 4px; text-transform: uppercase; transition: 0.2s; white-space: nowrap; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .btn-red { border-color: var(--error); color: var(--error); }

        .sync-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .mode-tag { color: var(--neon); border: 1px solid var(--neon); padding: 2px 6px; border-radius: 3px; font-size: 0.6rem; margin-right: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:25px; font-family: 'Syncopate'; font-size: 0.9rem;">NETWORK_LINK</h2>
        <input type="text" id="user-id" placeholder="USER_NAME" style="width:100%; margin-bottom:15px;">
        <input type="text" id="room-id" placeholder="ROOM_ID" style="width:100%; margin-bottom:20px;">
        <button class="btn" style="width:100%" onclick="app.init()">ESTABLISH_CONNECTION</button>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // HYBRID_V5</div>
    <div style="display:flex; gap:12px; align-items:center;">
        <div id="status-box" style="font-size:0.6rem; color:#444;">UPLINK_OFFLINE</div>
        <button class="btn" style="padding:6px 12px; font-size:0.6rem;" onclick="app.toggleChat()">CHAT_TOGGLE</button>
    </div>
</header>

<div class="app-container">
    <div class="video-section">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="media-url" placeholder="Paste URL (YouTube, Brocoflix, MP4)..." style="flex:1">
            <button class="btn" onclick="app.syncAction()">SIGNAL_PUSH</button>
        </div>

        <div id="display-viewport">
            <div id="interaction-shield" onclick="app.unmute()">
                <div class="btn">ACTIVATE SESSION & AUDIO</div>
                <p style="margin-top:15px; font-size:0.6rem; color:var(--neon); letter-spacing:1px;">SYNCING_TIMESTAMP...</p>
            </div>
            
            <div id="player-wrapper">
                <div id="player-mount"></div>
            </div>

            <iframe id="web-frame" allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
        </div>

        <div class="sync-controls" id="controls" style="display:none;">
            <button class="btn" id="btn-play" onclick="app.emit('PLAY')">PLAY_ALL</button>
            <button class="btn btn-red" id="btn-pause" onclick="app.emit('PAUSE')">PAUSE_ALL</button>
            <button class="btn" onclick="app.emit('SEEK')">SYNC_TIME</button>
            <div style="flex:1"></div>
            <div id="current-mode"></div>
        </div>
    </div>

    <div class="chat-sidebar" id="chat-sidebar">
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Transmission..." style="flex:1" onkeydown="if(event.key==='Enter')app.sendChat()">
            <button class="btn" onclick="app.sendChat()">SEND</button>
        </div>
    </div>
</div>

<script>
    const KEYS = { ABLY: '%%ABLY_KEY%%' };
    let player = null;
    let hls = null;

    const app = {
        state: { user: '', room: '', channel: null, url: '', mode: 'IDLE' },

        init() {
            const u = document.getElementById('user-id').value.trim();
            const r = document.getElementById('room-id').value.trim();
            if(!u || !r) return;
            this.state.user = u;
            this.state.room = r.toUpperCase();
            document.getElementById('auth-overlay').style.display = 'none';
            this.connect();
        },

        connect() {
            if (!KEYS.ABLY || KEYS.ABLY.startsWith('%%')) {
                document.getElementById('status-box').innerText = "DEV_MODE: OFFLINE_SYNC";
                return;
            }
            const realtime = new Ably.Realtime({ key: KEYS.ABLY });
            realtime.connection.on('connected', () => {
                this.state.channel = realtime.channels.get(`sync_${this.state.room}`);
                document.getElementById('status-box').innerText = `UPLINK_LIVE: ${this.state.room}`;
                document.getElementById('status-box').style.color = 'var(--neon)';
                
                this.state.channel.subscribe('sync', (msg) => this.handleSignal(msg.data));
                
                // Ask existing users for the current video state
                setTimeout(() => this.emit('QUERY_STATE'), 1500);
            });
        },

        toggleChat() { document.getElementById('chat-sidebar').classList.toggle('collapsed'); },

        unmute() {
            if (player) {
                player.muted = false;
                player.play().catch(e => console.warn("Unmute play blocked", e));
            }
            document.getElementById('interaction-shield').style.display = 'none';
        },

        syncAction() {
            const val = document.getElementById('media-url').value.trim();
            if(val) this.emit('LOAD', val);
        },

        load(url, time = 0) {
            this.state.url = url;
            const isDirect = /\.(mp4|m3u8|webm|ts|ogv|m4v)(\?.*)?$/i.test(url);
            const isYT = url.includes('youtube.com') || url.includes('youtu.be');
            
            document.getElementById('display-viewport').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            const modeTag = document.getElementById('current-mode');

            if (isDirect || isYT) {
                this.state.mode = 'MEDIA';
                modeTag.innerHTML = `<span class="mode-tag">MEDIA_SYNC</span>`;
                document.getElementById('web-frame').style.display = 'none';
                document.getElementById('player-wrapper').style.display = 'block';
                document.getElementById('btn-play').style.display = 'inline-block';
                document.getElementById('btn-pause').style.display = 'inline-block';
                this.setupPlayer(url, isYT, time);
            } else {
                this.state.mode = 'WEB';
                modeTag.innerHTML = `<span class="mode-tag" style="color:orange; border-color:orange;">WEB_VIEW</span>`;
                document.getElementById('player-wrapper').style.display = 'none';
                document.getElementById('web-frame').style.display = 'block';
                document.getElementById('web-frame').src = url;
                document.getElementById('btn-play').style.display = 'none';
                document.getElementById('btn-pause').style.display = 'none';
                if(player) player.destroy();
            }
        },

        setupPlayer(url, isYT, time) {
            if (player) player.destroy();
            if (hls) hls.destroy();
            const mount = document.getElementById('player-mount');
            document.getElementById('interaction-shield').style.display = 'flex';

            if (isYT) {
                const id = url.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=))([^#\&\?]*)/)?.[1];
                mount.innerHTML = `<div class="plyr__video-embed"><iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&enablejsapi=1"></iframe></div>`;
                player = new Plyr(mount.firstElementChild, { autoplay: true, muted: true });
            } else {
                mount.innerHTML = `<video playsinline controls autoplay muted crossorigin></video>`;
                const v = mount.querySelector('video');
                if (url.includes('.m3u8') && Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(v);
                } else { v.src = url; }
                player = new Plyr(v, { autoplay: true, muted: true });
            }
            player.on('ready', () => { if(time > 0) player.currentTime = time; });
        },

        emit(type, payload = null) {
            if (!this.state.channel) return;
            this.state.channel.publish('sync', {
                type, user: this.state.user,
                url: payload || this.state.url,
                time: player ? player.currentTime : 0
            });
        },

        handleSignal(data) {
            if(data.type === 'CHAT') return this.addChat(data.user, data.msg);
            switch(data.type) {
                case 'LOAD': this.load(data.url); break;
                case 'PLAY': if(player) { player.currentTime = data.time; player.play(); } break;
                case 'PAUSE': if(player) { player.pause(); player.currentTime = data.time; } break;
                case 'SEEK': if(player) player.currentTime = data.time; break;
                case 'QUERY_STATE': 
                    if(data.user !== this.state.user && this.state.url) this.emit('STATE_DATA'); 
                    break;
                case 'STATE_DATA': 
                    if(data.user !== this.state.user && !this.state.url) this.load(data.url, data.time); 
                    break;
            }
        },

        sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;
            if(this.state.channel) {
                this.state.channel.publish('sync', { type: 'CHAT', user: this.state.user, msg: msg });
            } else {
                this.addChat(this.state.user, msg);
            }
            input.value = '';
        },

        addChat(user, msg) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="msg-user">${user}:</span> <span></span>`;
            div.querySelector('span:last-child').textContent = msg; // Secure from XSS
            const box = document.getElementById('chat-messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    };
</script>
</body>
</html>
