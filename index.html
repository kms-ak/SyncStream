<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SyncStream // Retrofuturistic</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/ably@1/ably.min.js"></script>
<style>
:root {
  --bg: #050505; --surface: #0f0f12; --accent: #00f2ff; 
  --border: #1a1a24; --text-main: #e0e0e6; --text-dim: #707080;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.6; }

/* Setup Modal */
.modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
.modal-card { background: var(--surface); border: 1px solid var(--accent); padding: 3rem; border-radius: 4px; width: 400px; text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
.modal-card h2 { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 2rem; color: var(--accent); }

/* Elements */
input { width: 100%; padding: 12px; margin: 10px 0; background: transparent; border: 1px solid var(--border); color: white; border-radius: 2px; outline: none; }
input:focus { border-color: var(--accent); }
.btn { width: 100%; padding: 14px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; transition: 0.3s; }
.btn:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); }

header { padding: 1.5rem 3rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
.logo { font-family: 'Syncopate', sans-serif; font-size: 1rem; letter-spacing: 4px; color: var(--accent); }

main { max-width: 1000px; margin: 0 auto; padding: 3rem 1.5rem; }
#yt-player { width: 100%; aspect-ratio: 16/9; border: 1px solid var(--border); margin-bottom: 1.5rem; background: #000; }

.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 2rem; }
.movie-card { cursor: pointer; background: var(--surface); border: 1px solid var(--border); transition: 0.2s; }
.movie-card:hover { border-color: var(--accent); transform: scale(1.02); }
.movie-card img { width: 100%; opacity: 0.8; }
.movie-card p { padding: 10px; font-size: 0.8rem; color: var(--text-dim); }
</style>
</head>
<body>

<div id="join-modal" class="modal">
  <div class="modal-card">
    <h2>SYSTEM_ACCESS</h2>
    <input id="name-in" placeholder="IDENT_NAME">
    <input id="room-in" placeholder="SECTOR_CODE">
    <button class="btn" onclick="app.init()">Initialize</button>
  </div>
</div>

<header>
  <div class="logo">SYNC_STREAM // v2.0</div>
  <div id="status" style="font-size:0.7rem; color:var(--accent);">OFFLINE</div>
</header>

<main>
  <div style="margin-bottom: 3rem;">
    <input id="search-in" placeholder="SEARCH_DATABASE..." style="width: 75%;" onkeydown="if(event.key==='Enter')app.search()">
    <button class="btn" style="width: 20%; margin-left: 4%;" onclick="app.search()">Query</button>
    <div id="results" class="results-grid"></div>
  </div>

  <div id="player-container" style="display:none;">
    <div id="yt-player"></div>
    <div style="display:flex; gap:20px;">
      <button class="btn" onclick="app.sendSync('PLAY')">Execute_Play</button>
      <button class="btn" style="border-color:#333; color:#555;" onclick="app.sendSync('PAUSE')">Halt_System</button>
    </div>
  </div>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const CONFIG = {
  ABLY_KEY: '%%ABLY_KEY%%',
  YOUTUBE_KEY: '%%YOUTUBE_KEY%%'
};

let player;
function onYouTubeIframeAPIReady() {}

const app = {
  state: { user: '', room: '', channel: null },

  init() {
    this.state.user = document.getElementById('name-in').value || 'USER_STATION';
    this.state.room = document.getElementById('room-in').value.toUpperCase() || 'CORE';
    document.getElementById('join-modal').style.display = 'none';
    document.getElementById('status').innerText = 'LINKED // ' + this.state.room;
    this.connect();
  },

  connect() {
    const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
    this.state.channel = ably.channels.get('stream-' + this.state.room);
    this.state.channel.subscribe('sync', m => this.handleRemote(m.data));
  },

  async search() {
    const q = document.getElementById('search-in').value;
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}+full+movie&type=video&videoEmbeddable=true&maxResults=6&key=${CONFIG.YOUTUBE_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    this.renderResults(data.items);
  },

  renderResults(items) {
    const out = document.getElementById('results');
    out.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'movie-card';
      div.innerHTML = `<img src="${item.snippet.thumbnails.medium.url}"><p>${item.snippet.title}</p>`;
      div.onclick = () => this.loadVideo(item.id.videoId, true);
      out.appendChild(div);
    });
  },

  loadVideo(id, publish) {
    document.getElementById('player-container').style.display = 'block';
    if (!player) {
      player = new YT.Player('yt-player', { height: '100%', width: '100%', videoId: id });
    } else {
      player.loadVideoById(id);
    }
    if (publish) this.state.channel.publish('sync', { action: 'LOAD', id });
  },

  sendSync(action) {
    // FIX: Get current time so both players are frame-accurate
    const time = player.getCurrentTime();
    this.state.channel.publish('sync', { action, time });
    
    // Local control
    action === 'PLAY' ? player.playVideo() : player.pauseVideo();
  },

  handleRemote(data) {
    if (data.action === 'LOAD') this.loadVideo(data.id, false);
    if (data.action === 'PLAY') { 
      player.seekTo(data.time, true); // Jump to partner's exact time
      player.playVideo(); 
    }
    if (data.action === 'PAUSE') {
      player.seekTo(data.time, true);
      player.pauseVideo();
    }
  }
};
</script>
</body>
</html>
