<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // TOTAL_CONTROL_V9</title>
    
    <!-- Ably for Real-time Messaging -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <!-- Plyr & HLS.js for Universal Video Support -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #0a0a0f; 
            --panel: #12121a; 
            --border: #1f1f2e; 
            --text: #e0e0e6; 
            --error: #ff4d4d;
            --chat-bg: #0d0d14;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH OVERLAY --- */
        #auth-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: 10000; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .auth-card { 
            border: 1px solid var(--neon); 
            padding: 40px; 
            width: 90%; 
            max-width: 400px; 
            background: var(--panel); 
            text-align: center; 
            box-shadow: 0 0 30px rgba(0,242,255,0.15); 
            border-radius: 8px; 
        }
        
        /* --- HEADER --- */
        header { 
            height: 60px;
            padding: 0 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--panel);
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 2px; font-size: 0.75rem; }
        
        /* --- LAYOUT --- */
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        .video-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            overflow-y: auto; 
        }
        
        #display-viewport {
            width: 100%;
            height: 65vh;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #web-frame { width: 100%; height: 100%; border: none; display: none; background: #fff; }
        #player-wrapper { width: 100%; height: 100%; display: none; }

        /* --- INTERACTION SHIELD --- */
        #interaction-shield {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        /* --- CHAT SIDEBAR --- */
        .chat-sidebar { 
            width: 350px; 
            background: var(--chat-bg); 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .chat-sidebar.collapsed { transform: translateX(100%); width: 0; border: none; }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            scrollbar-width: thin;
        }
        .msg { 
            font-size: 0.85rem; 
            background: rgba(255,255,255,0.03); 
            padding: 10px; 
            border-radius: 4px; 
            border-left: 2px solid var(--neon); 
        }
        .msg-system { border-left-color: #444; color: #666; font-size: 0.75rem; font-style: italic; }
        .msg-user { color: var(--neon); font-weight: bold; margin-right: 8px; text-transform: uppercase; font-size: 0.7rem; }
        
        .chat-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        
        input { 
            background: #050508; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 12px; 
            border-radius: 4px; 
            outline: none; 
            font-family: 'Fira Code', monospace; 
            font-size: 0.8rem; 
            width: 100%; 
        }
        input:focus { border-color: var(--neon); }
        
        .btn { 
            padding: 10px 20px; 
            background: transparent; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            cursor: pointer; 
            font-family: 'Syncopate', sans-serif;
            font-weight: bold; 
            font-size: 0.65rem; 
            border-radius: 4px; 
            text-transform: uppercase; 
            transition: all 0.2s; 
        }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        .sync-controls { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin-top: 10px; 
            align-items: center; 
        }
        .status-tag { 
            font-family: 'Fira Code'; 
            font-size: 0.6rem; 
            color: #555; 
            text-transform: uppercase; 
            padding: 4px 8px; 
            border: 1px solid #222; 
        }

        #empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #333;
            font-family: 'Syncopate';
            font-size: 0.8rem;
        }

        /* Plyr Theme Overrides */
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: var(--neon); color: #000; }
        .plyr--video .plyr__controls { background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.8)); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:25px; font-family: 'Syncopate'; font-size: 0.9rem;">ESTABLISH_UPLINK</h2>
        <input type="text" id="user-id" placeholder="USER_ID">
        <div style="height:15px;"></div>
        <input type="text" id="room-id" placeholder="ROOM_CODE">
        <div style="height:25px;"></div>
        <button class="btn" style="width:100%; padding: 15px;" onclick="app.init()">INITIALIZE</button>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // TOTAL_CONTROL_V9</div>
    <div style="display:flex; gap:15px; align-items:center;">
        <div id="status-display" class="status-tag">OFFLINE</div>
        <button class="btn" style="padding:6px 12px; font-size:0.6rem;" onclick="app.toggleChat()">CHAT</button>
    </div>
</header>

<div class="app-container">
    <div class="video-section">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="media-url" placeholder="Direct URL, HLS, or YouTube...">
            <button class="btn" onclick="app.broadcastLoad()">PUSH_LOAD</button>
        </div>

        <div id="display-viewport">
            <div id="empty-state">NO_ACTIVE_STREAM</div>
            
            <div id="interaction-shield" onclick="app.unmuteAndSync()">
                <button class="btn" style="padding: 20px 40px; font-size: 1rem; border-width: 2px;">JOIN SESSION (ENABLE AUDIO)</button>
                <p style="color:var(--neon); margin-top:20px; font-family:'Fira Code'; font-size:0.7rem;">TIMESTAMP_UPLINK_PENDING...</p>
            </div>
            
            <div id="player-wrapper">
                <div id="player-mount"></div>
            </div>

            <iframe id="web-frame" allow="autoplay; fullscreen; encrypted-media;"></iframe>
        </div>

        <div class="sync-controls">
            <button class="btn" onclick="app.emitSignal('PLAY')">FORCE_PLAY</button>
            <button class="btn" onclick="app.emitSignal('PAUSE')">FORCE_PAUSE</button>
            <button class="btn" onclick="app.emitSignal('SEEK')">SYNC_TIMESTAMPS</button>
            <div id="active-src" style="margin-left: 15px; font-size: 0.6rem; color: #444; font-family: 'Fira Code'; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></div>
        </div>
    </div>

    <div class="chat-sidebar" id="chat-sidebar">
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Broadcasting..." onkeydown="if(event.key==='Enter')app.sendChat()">
            <button class="btn" onclick="app.sendChat()">SEND</button>
        </div>
    </div>
</div>

<script>
    const ABLY_KEY = 'j0IuLw.2D-5qA:I-0n9Rz0h6L7O5e0';
    let player = null;
    let hls = null;

    const app = {
        config: { user: '', room: '', channel: null },
        state: {
            currentUrl: '',
            isRemoteAction: false, 
            lastMsgId: null,
            targetTime: 0,
            isPlaying: false
        },

        init() {
            const u = document.getElementById('user-id').value.trim();
            const r = document.getElementById('room-id').value.trim().toUpperCase();
            if(!u || !r) return;
            this.config.user = u;
            this.config.room = r;
            document.getElementById('auth-overlay').remove();
            this.connect();
        },

        connect() {
            const realtime = new Ably.Realtime({ key: ABLY_KEY, clientId: this.config.user });
            realtime.connection.on('connected', () => {
                this.config.channel = realtime.channels.get(`sync_v9_${this.config.room}`);
                document.getElementById('status-display').innerText = `CONNECTED: ${this.config.room}`;
                document.getElementById('status-display').style.color = 'var(--neon)';

                this.config.channel.subscribe('signal', (msg) => this.handleIncomingSignal(msg.data));
                
                // Presence logic for auto-syncing new users
                this.config.channel.presence.subscribe('enter', (m) => {
                    this.addSystemMsg(`${m.clientId} joined.`);
                    if(m.clientId !== this.config.user && this.state.currentUrl) {
                        this.emitSignal('STATE_DATA', { url: this.state.currentUrl, playing: this.state.isPlaying });
                    }
                });
                
                this.config.channel.presence.enter();
                this.emitSignal('QUERY_STATE');
            });
        },

        toggleChat() { document.getElementById('chat-sidebar').classList.toggle('collapsed'); },

        unmuteAndSync() {
            document.getElementById('interaction-shield').style.display = 'none';
            if (player) {
                player.muted = false;
                player.volume = 1;
                if(this.state.targetTime > 0) player.currentTime = this.state.targetTime;
                player.play().catch(() => {
                    console.log("Autoplay blocked, user interaction required.");
                });
            }
        },

        broadcastLoad() {
            const url = document.getElementById('media-url').value.trim();
            if(!url) return;
            this.emitSignal('LOAD', { url });
            this.loadMedia(url, 0); // Load locally immediately
        },

        emitSignal(type, data = {}) {
            if(!this.config.channel) return;
            const msgId = Math.random().toString(36).substring(7);
            this.state.lastMsgId = msgId;
            const payload = { 
                type, 
                msgId, 
                sender: this.config.user, 
                time: player ? player.currentTime : 0,
                ...data 
            };
            this.config.channel.publish('signal', payload);
        },

        handleIncomingSignal(data) {
            if (data.sender === this.config.user || data.msgId === this.state.lastMsgId) return;
            
            // Set safety lock
            this.state.isRemoteAction = true;

            switch(data.type) {
                case 'LOAD':
                    this.loadMedia(data.url, data.time);
                    break;
                case 'PLAY':
                    if(player) {
                        if(Math.abs(player.currentTime - data.time) > 1.5) player.currentTime = data.time;
                        player.play();
                    }
                    break;
                case 'PAUSE':
                    if(player) { player.pause(); player.currentTime = data.time; }
                    break;
                case 'SEEK':
                    if(player) player.currentTime = data.time;
                    break;
                case 'QUERY_STATE':
                    if(this.state.currentUrl) this.emitSignal('STATE_DATA', { url: this.state.currentUrl, playing: this.state.isPlaying });
                    break;
                case 'STATE_DATA':
                    if(!this.state.currentUrl || this.state.currentUrl !== data.url) {
                        this.loadMedia(data.url, data.time);
                    }
                    break;
                case 'CHAT':
                    this.addChat(data.sender, data.text);
                    break;
            }

            // Release safety lock after buffer
            setTimeout(() => { this.state.isRemoteAction = false; }, 800);
        },

        loadMedia(url, startTime = 0) {
            if(url === this.state.currentUrl && player) return;

            this.state.currentUrl = url;
            this.state.targetTime = startTime;
            document.getElementById('active-src').innerText = `SOURCE: ${url}`;
            document.getElementById('empty-state').style.display = 'none';

            const isYT = url.includes('youtube.com') || url.includes('youtu.be');
            const isDirect = /\.(mp4|m3u8|webm|ts|mkv|mov)$/i.test(url) || url.includes('brocoflix');

            if (isYT || isDirect) {
                document.getElementById('web-frame').style.display = 'none';
                document.getElementById('player-wrapper').style.display = 'block';
                document.getElementById('interaction-shield').style.display = 'flex';
                this.initPlayer(url, isYT, startTime);
            } else {
                document.getElementById('player-wrapper').style.display = 'none';
                document.getElementById('interaction-shield').style.display = 'none';
                document.getElementById('web-frame').style.display = 'block';
                document.getElementById('web-frame').src = url;
            }
        },

        initPlayer(url, isYT, startTime) {
            if (player) player.destroy();
            if (hls) hls.destroy();

            const mount = document.getElementById('player-mount');
            if (isYT) {
                mount.innerHTML = `<div id="plyr-target" data-plyr-provider="youtube" data-plyr-embed-id="${url}"></div>`;
            } else {
                mount.innerHTML = `<video id="plyr-target" playsinline controls crossorigin muted></video>`;
                const video = mount.querySelector('video');
                
                // Logic for HLS (Master Playlists)
                if ((url.includes('.m3u8') || url.includes('brocoflix') || url.includes('playlist')) && Hls.isSupported()) {
                    hls = new Hls({ enableWorker: true });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else {
                    video.src = url;
                }
            }

            player = new Plyr('#plyr-target', { 
                autoplay: true, 
                muted: true, 
                ratio: '16:9',
                keyboard: { global: true }
            });

            player.on('ready', () => { 
                if(startTime > 0) player.currentTime = startTime;
                player.play();
            });

            // Sync Logic Binders
            player.on('play', () => { 
                this.state.isPlaying = true;
                if(!this.state.isRemoteAction) this.emitSignal('PLAY'); 
            });
            player.on('pause', () => { 
                this.state.isPlaying = false;
                if(!this.state.isRemoteAction) this.emitSignal('PAUSE'); 
            });
            player.on('seeked', () => { 
                if(!this.state.isRemoteAction) this.emitSignal('SEEK'); 
            });
        },

        sendChat() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            this.emitSignal('CHAT', { text: val });
            this.addChat(this.config.user, val);
            input.value = '';
        },

        addChat(user, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="msg-user">${user}:</span> <span></span>`;
            div.querySelector('span:last-child').textContent = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        addSystemMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg msg-system';
            div.textContent = `> SYSTEM: ${text}`;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    };
</script>

</body>
</html>
