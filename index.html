<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // OPERATOR_INTERFACE</title>
    <!-- CRITICAL: Ably Library must load first -->
    <script src="https://cdn.jsdelivr.net/npm/ably@1/ably.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050507; --panel: #0d0d12; --border: #1a1a24; --text: #e0e0e6; }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: var(--bg); color: var(--text); font-family: 'Fira Code', monospace; line-height: 1.6; }
        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 1px solid var(--neon); padding: 40px; width: 400px; background: var(--panel); text-align: center; box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(13,13,18,0.8); backdrop-filter: blur(10px); }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 4px; font-size: 0.8rem; text-shadow: 0 0 10px var(--neon); }
        main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--neon); margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .btn { padding: 15px; border: 1px solid var(--neon); background: transparent; color: var(--neon); text-transform: uppercase; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        #player-wrapper { display: none; margin-bottom: 40px; border: 1px solid var(--border); padding: 10px; background: #000; }
        #yt-player { width: 100%; aspect-ratio: 16/9; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .movie-card { background: var(--panel); border: 1px solid var(--border); cursor: pointer; overflow: hidden; position: relative; }
        .movie-card img { width: 100%; display: block; opacity: 0.6; transition: 0.3s; }
        .movie-card:hover img { opacity: 1; transform: scale(1.05); }
        .status-tag { font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:20px;">SYSTEM_INITIALIZE</h2>
        <input type="text" id="user-in" placeholder="OPERATOR_ID">
        <input type="text" id="room-in" placeholder="SECTOR_CODE">
        <button class="btn" style="width:100%" onclick="app.init()">ACCESS_SYSTEM</button>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // v3.2</div>
    <div id="status" class="status-tag">STATUS: OFFLINE</div>
</header>

<main>
    <div style="display:flex; gap:10px; margin-bottom:30px;">
        <input id="query" placeholder="QUERY_GLOBAL_DATABASE..." style="margin:0" onkeydown="if(event.key==='Enter')app.search()">
        <button class="btn" style="width:150px;" onclick="app.search()">SEARCH</button>
    </div>

    <div id="player-wrapper">
        <div id="yt-player"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <button class="btn" onclick="app.sync('PLAY')">UNHALT_STREAM</button>
            <button class="btn" style="border-color:#333; color:#555;" onclick="app.sync('PAUSE')">HALT_SYSTEM</button>
        </div>
    </div>

    <div id="results" class="results-grid"></div>
</main>

<script>
    const CONFIG = {
        ABLY_KEY: '%%ABLY_KEY%%',
        TMDB_KEY: '%%TMDB_KEY%%',
        YOUTUBE_KEY: '%%YOUTUBE_KEY%%'
    };

    var player;
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    const app = {
        state: { user: '', room: '', channel: null },

        init() {
            this.state.user = document.getElementById('user-in').value || 'ADMIN_' + Math.floor(Math.random()*999);
            this.state.room = document.getElementById('room-in').value.toUpperCase().trim();
            if(!this.state.room) return alert("REQUIRED: SECTOR_CODE");
            document.getElementById('auth-overlay').style.display = 'none';
            this.connect();
        },

        connect() {
            try {
                const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
                this.state.channel = ably.channels.get(`stream-${this.state.room}`);
                
                this.state.channel.subscribe('sync', m => {
                    console.log(">> SIGNAL_IN:", m.data);
                    this.handleRemote(m.data);
                });

                // LATE JOINER LOGIC: Ask if anyone is already watching
                this.state.channel.publish('sync', { action: 'REQUEST_TIME', sender: this.state.user });

                document.getElementById('status').innerText = `CONNECTED: ${this.state.room}`;
                document.getElementById('status').style.color = 'var(--neon)';
            } catch(e) {
                document.getElementById('status').innerText = "LINK_ERROR";
            }
        },

        async search() {
            const q = document.getElementById('query').value;
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${CONFIG.TMDB_KEY}&query=${encodeURIComponent(q)}`);
            const data = await res.json();
            this.renderResults(data.results);
        },

        renderResults(movies) {
            const out = document.getElementById('results');
            out.innerHTML = '';
            movies.slice(0, 10).forEach(m => {
                if(!m.poster_path) return;
                const div = document.createElement('div');
                div.className = 'movie-card';
                div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}">`;
                div.onclick = () => this.fetchVideo(m.title, m.id);
                out.appendChild(div);
            });
        },

        async fetchVideo(title, id) {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${CONFIG.TMDB_KEY}`);
            const data = await res.json();
            const vid = data.results.find(v => v.site === 'YouTube' && v.type === 'Trailer') || data.results[0];
            if(vid) this.loadVideo(vid.key, true);
        },

        loadVideo(id, publish) {
            document.getElementById('player-wrapper').style.display = 'block';
            if (!player) {
                player = new YT.Player('yt-player', {
                    height: '100%', width: '100%', videoId: id,
                    playerVars: { 'autoplay': 1, 'controls': 0 }
                });
            } else {
                player.loadVideoById(id);
            }
            if (publish) this.state.channel.publish('sync', { action: 'LOAD', id: id, sender: this.state.user });
        },

        sync(action) {
            if(!player || !player.getCurrentTime) return;
            const time = player.getCurrentTime();
            this.state.channel.publish('sync', { action: action, time: time, sender: this.state.user });
            action === 'PLAY' ? player.playVideo() : player.pauseVideo();
        },

        handleRemote(data) {
            if (data.sender === this.state.user) return;

            if (data.action === 'LOAD') {
                this.loadVideo(data.id, false);
            } else if (data.action === 'REQUEST_TIME') {
                // If I am the host and watching, send my time to the newcomer
                if(player && player.getCurrentTime) {
                    this.state.channel.publish('sync', { 
                        action: 'SEND_TIME', 
                        time: player.getCurrentTime(), 
                        id: player.getVideoData().video_id,
                        sender: this.state.user 
                    });
                }
            } else if (data.action === 'SEND_TIME') {
                this.loadVideo(data.id, false);
                setTimeout(() => player.seekTo(data.time, true), 1000);
            } else if (player) {
                if (data.action === 'PLAY') { player.seekTo(data.time, true); player.playVideo(); }
                if (data.action === 'PAUSE') { player.pauseVideo(); player.seekTo(data.time, true); }
            }
        }
    };
</script>
</body>
</html>
