<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // HYBRID_V5</title>
    
    <!-- Ably for Real-time Messaging -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <!-- Plyr & HLS.js -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #050508; 
            --panel: #0a0a0f; 
            --border: #1a1a24; 
            --text: #e0e0e6; 
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH OVERLAY --- */
        #auth-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: 10000; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .auth-card { 
            border: 1px solid var(--border); 
            padding: 40px; 
            width: 90%; 
            max-width: 400px; 
            background: var(--panel); 
            text-align: center; 
            border-radius: 4px; 
        }
        
        /* --- HEADER --- */
        header { 
            height: 60px;
            padding: 0 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 2px; font-size: 0.85rem; }
        
        .header-meta { display: flex; gap: 20px; align-items: center; font-family: 'Syncopate'; font-size: 0.65rem; color: var(--neon); }

        /* --- LAYOUT --- */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        .main-stage { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 30px; 
            position: relative;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #display-viewport {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        #web-frame { width: 100%; height: 100%; border: none; display: none; }
        #player-wrapper { width: 100%; height: 100%; display: none; }

        /* --- OVERLAYS --- */
        #interaction-shield {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        #empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #222;
            font-family: 'Syncopate';
            font-size: 0.8rem;
            pointer-events: none;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 380px; 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg);
        }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .msg { font-size: 0.8rem; font-family: 'Inter'; color: #888; font-style: italic; }
        .msg-user { color: #aaa; margin-right: 8px; font-weight: normal; }

        .chat-input-row { 
            padding: 20px; 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 10px; 
        }
        
        /* --- UI ELEMENTS --- */
        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 2px; 
            outline: none; 
            font-family: 'Inter', sans-serif; 
            font-size: 0.85rem; 
            width: 100%; 
        }
        input:focus { border-color: var(--neon); }
        
        .btn { 
            padding: 10px 20px; 
            background: transparent; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            cursor: pointer; 
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem; 
            border-radius: 4px; 
            transition: all 0.2s; 
            white-space: nowrap;
        }
        .btn:hover { background: rgba(0, 242, 255, 0.1); }
        .btn-red { border-color: #ff3e3e; color: #ff3e3e; }
        .btn-red:hover { background: rgba(255, 62, 62, 0.1); }
        .btn-filled { background: var(--neon); color: #000; }

        .footer-controls {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 20px;
        }

        .control-group { display: flex; gap: 15px; }

        /* Plyr Customization */
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: var(--neon); color: #000; }
        .plyr--video .plyr__controls { background: transparent !important; }
        
        #status-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 5px var(--error);
        }
        #status-light.online {
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:25px; font-family: 'Syncopate'; font-size: 0.8rem;">ESTABLISH_UPLINK</h2>
        <input type="text" id="user-id" placeholder="USER_NAME">
        <div style="height:12px;"></div>
        <input type="text" id="room-id" placeholder="ROOM_CODE">
        <div style="height:25px;"></div>
        <button class="btn btn-filled" style="width:100%" onclick="app.init()">INITIALIZE</button>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // HYBRID_V5</div>
    <div class="header-meta">
        <div style="display: flex; align-items: center;">
            <span id="status-light"></span>
            <div id="room-display">UPLINK_OFFLINE</div>
        </div>
        <button class="btn" style="border-width:1px;" onclick="app.toggleChat()">CHAT_TOGGLE</button>
    </div>
</header>

<div class="app-container">
    <div class="main-stage">
        <div class="input-row">
            <input type="text" id="media-url" placeholder="Paste URL (YouTube, Brocoflix, MP4) ...">
            <button class="btn" onclick="app.broadcastLoad()">SIGNAL_PUSH</button>
        </div>

        <div id="display-viewport">
            <div id="empty-state">WAITING_FOR_SIGNAL...<br><span style="font-size: 0.6rem; opacity: 0.5;">Paste a URL or wait for room host.</span></div>
            
            <div id="interaction-shield" onclick="app.unmuteAndSync()">
                <button class="btn" style="padding: 15px 30px; font-size: 0.8rem;">ACTIVATE SESSION & AUDIO</button>
                <p id="sync-status-msg" style="color:var(--neon); margin-top:15px; font-family:'Fira Code'; font-size:0.65rem;">SYNCING_TIMESTAMP...</p>
            </div>
            
            <div id="player-wrapper">
                <div id="player-mount"></div>
            </div>

            <iframe id="web-frame" allow="autoplay; fullscreen; encrypted-media;"></iframe>
        </div>

        <div class="footer-controls">
            <div class="control-group">
                <button class="btn" onclick="app.emitSignal('PLAY')">PLAY_ALL</button>
                <button class="btn btn-red" onclick="app.emitSignal('PAUSE')">PAUSE_ALL</button>
                <button class="btn" onclick="app.emitSignal('SEEK')">SYNC_TIME</button>
            </div>
            <div class="control-group">
                <div id="media-sync-indicator" class="btn" style="border:none; opacity:0.6; cursor:default;">MEDIA_SYNC</div>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Transmission ..." onkeydown="if(event.key==='Enter')app.sendChat()">
            <button class="btn" onclick="app.sendChat()">SEND</button>
        </div>
    </div>
</div>

<script>
    // Critical: Ensure valid Ably Key and initialization flow
    const ABLY_KEY = 'j0IuLw.2D-5qA:I-0n9Rz0h6L7O5e0';
    let player = null;
    let hls = null;

    const app = {
        config: { user: '', room: '', channel: null, realtime: null },
        state: {
            currentUrl: '',
            isRemoteAction: false, 
            targetTime: 0,
            isPlaying: false,
            syncThreshold: 1.5 
        },

        init() {
            const u = document.getElementById('user-id').value.trim();
            const r = document.getElementById('room-id').value.trim().toUpperCase();
            if(!u || !r) return;
            this.config.user = u;
            this.config.room = r;
            document.getElementById('auth-overlay').style.display = 'none';
            this.connect();
        },

        connect() {
            try {
                this.config.realtime = new Ably.Realtime({ key: ABLY_KEY, clientId: this.config.user });
                
                this.config.realtime.connection.on('connected', () => {
                    this.config.channel = this.config.realtime.channels.get(`sync_v5_${this.config.room}`);
                    
                    // Update UI status
                    const statusLight = document.getElementById('status-light');
                    statusLight.classList.add('online');
                    document.getElementById('room-display').innerText = `UPLINK_LIVE: ${this.config.room}`;

                    // Subscriptions
                    this.config.channel.subscribe('signal', (msg) => this.handleIncomingSignal(msg.data));
                    
                    this.config.channel.presence.subscribe('enter', (m) => {
                        this.addSystemMsg(`${m.clientId} joined.`);
                        if(m.clientId !== this.config.user && this.state.currentUrl) {
                            this.emitSignal('STATE_SYNC', { url: this.state.currentUrl, playing: this.state.isPlaying });
                        }
                    });
                    
                    this.config.channel.presence.enter();
                    // Ask for current state from anyone already in room
                    this.emitSignal('QUERY_STATE');
                });

                this.config.realtime.connection.on('failed', () => {
                    this.addSystemMsg("Connection failed. Check API key or network.");
                });

                this.config.realtime.connection.on('disconnected', () => {
                    document.getElementById('status-light').classList.remove('online');
                });

            } catch (e) {
                console.error("Ably Init Error:", e);
                this.addSystemMsg("System Error: Check console.");
            }
        },

        toggleChat() {
            const sb = document.getElementById('sidebar');
            sb.style.display = sb.style.display === 'none' ? 'flex' : 'none';
        },

        unmuteAndSync() {
            document.getElementById('interaction-shield').style.display = 'none';
            if (player) {
                player.muted = false;
                player.volume = 1;
                // If there's a specific target time from a sync signal, jump to it
                if(this.state.targetTime > 0) {
                    player.currentTime = this.state.targetTime;
                }
                player.play();
            }
        },

        broadcastLoad() {
            const url = document.getElementById('media-url').value.trim();
            if(!url) return;
            this.emitSignal('LOAD', { url, time: 0 });
            this.loadMedia(url, 0); 
        },

        emitSignal(type, data = {}) {
            if(!this.config.channel) {
                this.addSystemMsg("Error: Uplink offline. Cannot send signal.");
                return;
            }
            const payload = { 
                type, 
                sender: this.config.user, 
                time: player ? player.currentTime : 0,
                ...data 
            };
            this.config.channel.publish('signal', payload);
        },

        handleIncomingSignal(data) {
            if (data.sender === this.config.user) return;
            
            // Set global lock to prevent feedback loops
            this.state.isRemoteAction = true;

            switch(data.type) {
                case 'LOAD':
                    this.loadMedia(data.url, data.time);
                    break;
                case 'PLAY':
                    if(player) {
                        const diff = Math.abs(player.currentTime - data.time);
                        if(diff > this.state.syncThreshold) player.currentTime = data.time;
                        player.play();
                    }
                    break;
                case 'PAUSE':
                    if(player) { 
                        player.pause(); 
                        player.currentTime = data.time; 
                    }
                    break;
                case 'SEEK':
                    if(player) player.currentTime = data.time;
                    break;
                case 'QUERY_STATE':
                    if(this.state.currentUrl) {
                        this.emitSignal('STATE_SYNC', { url: this.state.currentUrl, playing: this.state.isPlaying });
                    }
                    break;
                case 'STATE_SYNC':
                    if(!this.state.currentUrl || this.state.currentUrl !== data.url) {
                        this.loadMedia(data.url, data.time);
                    } else {
                        // Just sync time if already on same URL
                        const diff = Math.abs(player.currentTime - data.time);
                        if(diff > this.state.syncThreshold) player.currentTime = data.time;
                        if(data.playing) player.play(); else player.pause();
                    }
                    break;
                case 'CHAT':
                    this.addChat(data.sender, data.text);
                    break;
            }

            // Release lock after a short delay
            setTimeout(() => { this.state.isRemoteAction = false; }, 800);
        },

        loadMedia(url, startTime = 0) {
            this.state.currentUrl = url;
            this.state.targetTime = startTime;
            document.getElementById('empty-state').style.display = 'none';

            const isYT = url.includes('youtube.com') || url.includes('youtu.be');
            const isDirect = /\.(mp4|m3u8|webm|ts|mkv|mov)$/i.test(url) || url.includes('brocoflix');

            if (isYT || isDirect) {
                document.getElementById('web-frame').style.display = 'none';
                document.getElementById('player-wrapper').style.display = 'block';
                document.getElementById('interaction-shield').style.display = 'flex';
                this.initPlayer(url, isYT, startTime);
            } else {
                document.getElementById('player-wrapper').style.display = 'none';
                document.getElementById('interaction-shield').style.display = 'none';
                document.getElementById('web-frame').style.display = 'block';
                document.getElementById('web-frame').src = url;
            }
        },

        initPlayer(url, isYT, startTime) {
            if (player) player.destroy();
            if (hls) hls.destroy();

            const mount = document.getElementById('player-mount');
            if (isYT) {
                mount.innerHTML = `<div id="plyr-target" data-plyr-provider="youtube" data-plyr-embed-id="${url}"></div>`;
            } else {
                mount.innerHTML = `<video id="plyr-target" playsinline controls crossorigin muted></video>`;
                const video = mount.querySelector('video');
                
                if ((url.includes('.m3u8') || url.includes('brocoflix')) && Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else {
                    video.src = url;
                }
            }

            player = new Plyr('#plyr-target', { 
                autoplay: true, 
                muted: true,
                youtube: { noCookie: true, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1 }
            });

            player.on('ready', () => { 
                if(startTime > 0) player.currentTime = startTime;
                player.play();
            });

            player.on('play', () => { 
                this.state.isPlaying = true;
                if(!this.state.isRemoteAction) this.emitSignal('PLAY'); 
            });
            player.on('pause', () => { 
                this.state.isPlaying = false;
                if(!this.state.isRemoteAction) this.emitSignal('PAUSE'); 
            });
            player.on('seeked', () => { 
                if(!this.state.isRemoteAction) this.emitSignal('SEEK'); 
            });
        },

        sendChat() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            this.emitSignal('CHAT', { text: val });
            this.addChat(this.config.user, val);
            input.value = '';
        },

        addChat(user, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="msg-user">> ${user}:</span> <span style="color:#eee; font-style: normal;"></span>`;
            div.querySelector('span:last-child').textContent = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        addSystemMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.textContent = `> ${text}`;
            document.getElementById('chat-messages').appendChild(div);
        }
    };
</script>

</body>
</html>
