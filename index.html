<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_STREAM // YOUTUBE_EDITION</title>
    
    <!-- Ably -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <!-- Plyr -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #050508; 
            --panel: #0a0a0f; 
            --border: #1a1a24; 
            --text: #e0e0e6; 
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH OVERLAY --- */
        #auth-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: 10000; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .auth-card { 
            border: 1px solid var(--border); 
            padding: 40px; 
            width: 90%; 
            max-width: 400px; 
            background: var(--panel); 
            text-align: center; 
            border-radius: 4px; 
        }

        #auth-debug {
            margin-top: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: #555;
            text-align: left;
            background: #000;
            padding: 10px;
            border: 1px solid #111;
            max-height: 120px;
            overflow-y: auto;
        }
        
        /* --- HEADER --- */
        header { 
            height: 60px;
            padding: 0 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--neon); letter-spacing: 2px; font-size: 0.85rem; }
        
        .header-meta { display: flex; gap: 20px; align-items: center; font-family: 'Syncopate'; font-size: 0.65rem; color: var(--neon); }

        /* --- LAYOUT --- */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        .main-stage { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 30px; 
            position: relative;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #display-viewport {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        #player-wrapper { width: 100%; height: 100%; }

        /* --- OVERLAYS --- */
        #interaction-shield {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        #empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #222;
            font-family: 'Syncopate';
            font-size: 0.8rem;
            pointer-events: none;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 350px; 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg);
        }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .msg { font-size: 0.8rem; font-family: 'Inter'; color: #888; }
        .msg-user { color: var(--neon); margin-right: 8px; font-weight: 600; font-family: 'Syncopate'; font-size: 0.6rem; }

        .chat-input-row { 
            padding: 20px; 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 10px; 
        }
        
        /* --- UI ELEMENTS --- */
        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 2px; 
            outline: none; 
            font-family: 'Inter', sans-serif; 
            font-size: 0.85rem; 
            width: 100%; 
        }
        input:focus { border-color: var(--neon); }
        
        .btn { 
            padding: 10px 20px; 
            background: transparent; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            cursor: pointer; 
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem; 
            border-radius: 4px; 
            transition: all 0.2s; 
            white-space: nowrap;
        }
        .btn:hover { background: rgba(0, 242, 255, 0.1); }
        .btn-filled { background: var(--neon); color: #000; }

        .footer-controls {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
        }

        .control-group { display: flex; gap: 15px; }

        #status-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            display: inline-block;
            margin-right: 8px;
        }
        #status-light.online {
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--neon); margin-bottom:25px; font-family: 'Syncopate'; font-size: 0.8rem;">SYNC_STREAM_INIT</h2>
        <input type="text" id="user-id" placeholder="USERNAME">
        <div style="height:12px;"></div>
        <input type="text" id="room-id" placeholder="ROOM_CODE">
        <div style="height:25px;"></div>
        <button id="init-btn" class="btn btn-filled" style="width:100%">JOIN_STREAM</button>
        <div id="auth-debug">Ready...</div>
    </div>
</div>

<header>
    <div class="logo">SYNC_STREAM // YT</div>
    <div class="header-meta">
        <div style="display: flex; align-items: center;">
            <span id="status-light"></span>
            <div id="room-display">OFFLINE</div>
        </div>
        <button class="btn" style="border-width:1px;" onclick="app.toggleChat()">TOGGLE_CHAT</button>
    </div>
</header>

<div class="app-container">
    <div class="main-stage">
        <div class="input-row">
            <input type="text" id="media-url" placeholder="Enter YouTube URL or Video ID...">
            <button class="btn" onclick="app.broadcastLoad()">LOAD_VIDEO</button>
        </div>

        <div id="display-viewport">
            <div id="empty-state">NO_ACTIVE_STREAM</div>
            
            <div id="interaction-shield" onclick="app.unmuteAndSync()">
                <button class="btn" style="padding: 15px 30px; font-size: 0.8rem;">ACTIVATE_AUDIO_AND_SYNC</button>
            </div>
            
            <div id="player-wrapper">
                <div id="player-mount"></div>
            </div>
        </div>

        <div class="footer-controls">
            <div class="control-group">
                <button class="btn" onclick="app.updateState({ playing: true })">PLAY</button>
                <button class="btn" onclick="app.updateState({ playing: false })" style="border-color:#ff3e3e; color:#ff3e3e;">PAUSE</button>
                <button class="btn" onclick="app.updateState({ time: player ? player.currentTime : 0 })">FORCE_SYNC</button>
            </div>
            <div id="latency-tag" style="font-size: 10px; color: #444; font-family: 'Fira Code';">SYNC: 0MS</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Say something..." onkeydown="if(event.key==='Enter')app.sendChat()">
            <button class="btn" onclick="app.sendChat()">SEND</button>
        </div>
    </div>
</div>

<script>
    let player = null;
    const ABLY_KEY = '%%ABLY_KEY%%';

    const app = {
        config: { user: '', room: '' },
        state: { currentUrl: '', isPlaying: false, isLocalAction: false },
        ably: null,
        channel: null,

        logDebug(msg) {
            const el = document.getElementById('auth-debug');
            if (el) {
                el.innerHTML += `<div>${msg}</div>`;
                el.scrollTop = el.scrollHeight;
            }
        },

        async init() {
            const u = document.getElementById('user-id').value.trim();
            const r = document.getElementById('room-id').value.trim().toUpperCase();
            
            if(!u || !r) {
                this.logDebug('Fill all fields');
                return;
            }

            this.config.user = u;
            this.config.room = r;

            try {
                this.logDebug('Connecting to Ably...');
                
                this.ably = new Ably.Realtime({ key: ABLY_KEY, clientId: u });
                
                await new Promise((res, rej) => {
                    this.ably.connection.once('connected', res);
                    this.ably.connection.once('failed', () => rej(new Error('Connection failed')));
                });
                
                this.logDebug('Connected!');
                document.getElementById('auth-overlay').style.display = 'none';
                this.startSession();
            } catch (e) {
                this.logDebug(`Error: ${e.message}`);
            }
        },

        startSession() {
            document.getElementById('status-light').classList.add('online');
            document.getElementById('room-display').innerText = `ROOM: ${this.config.room}`;
            
            this.channel = this.ably.channels.get(this.config.room);
            
            this.channel.subscribe('sync', (msg) => {
                if (msg.clientId === this.config.user) return;
                this.handleSync(msg.data);
            });
            
            this.channel.subscribe('chat', (msg) => {
                if (msg.clientId !== this.config.user) {
                    this.addChat(msg.clientId, msg.data.text);
                }
            });
            
            this.addSystemMsg(`Connected as ${this.config.user}`);
        },

        handleSync(data) {
            if (data.url && data.url !== this.state.currentUrl) {
                this.loadMedia(data.url, data.time || 0);
            }
            
            if (player) {
                this.state.isLocalAction = true;
                
                const diff = Math.abs(player.currentTime - data.time);
                if (diff > 1.5) player.currentTime = data.time;
                
                if (data.playing) player.play().catch(() => {});
                else player.pause();
                
                setTimeout(() => { this.state.isLocalAction = false; }, 500);
            }
        },

        publishSync(updates) {
            if (this.state.isLocalAction || !this.channel) return;
            
            const data = {
                url: updates.url || this.state.currentUrl,
                time: updates.time !== undefined ? updates.time : (player ? player.currentTime : 0),
                playing: updates.playing !== undefined ? updates.playing : this.state.isPlaying
            };
            
            this.channel.publish('sync', data);
        },

        broadcastLoad() {
            const url = document.getElementById('media-url').value.trim();
            if (!url) return;
            this.publishSync({ url, time: 0, playing: true });
            this.loadMedia(url, 0);
        },

        detectProvider(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const id = url.match(/(?:v=|youtu\.be\/)([^&?]+)/);
                return { type: 'youtube', id: id ? id[1] : url };
            }
            if (url.includes('vimeo.com')) {
                const id = url.match(/vimeo\.com\/(\d+)/);
                return { type: 'vimeo', id: id ? id[1] : url };
            }
            return { type: 'video', id: url };
        },

        loadMedia(url, startTime) {
            this.state.currentUrl = url;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('interaction-shield').style.display = 'flex';
            
            const mount = document.getElementById('player-mount');
            if (player) { try { player.destroy(); } catch(e) {} }

            const provider = this.detectProvider(url);
            let html = '';

            if (provider.type === 'youtube') {
                html = `<div id="player" data-plyr-provider="youtube" data-plyr-embed-id="${provider.id}"></div>`;
            } else if (provider.type === 'vimeo') {
                html = `<div id="player" data-plyr-provider="vimeo" data-plyr-embed-id="${provider.id}"></div>`;
            } else {
                html = `<video id="player" playsinline controls>
                    <source src="${url}" type="video/mp4">
                </video>`;
            }

            mount.innerHTML = html;

            player = new Plyr('#player', { 
                autoplay: true, 
                muted: true 
            });

            player.on('ready', () => { 
                if(startTime > 0) player.currentTime = startTime; 
                player.play().catch(() => {}); 
            });

            player.on('play', () => { 
                this.state.isPlaying = true;
                if(!this.state.isLocalAction) this.publishSync({ playing: true }); 
            });

            player.on('pause', () => { 
                this.state.isPlaying = false;
                if(!this.state.isLocalAction) this.publishSync({ playing: false }); 
            });

            player.on('seeked', () => {
                if(!this.state.isLocalAction) this.publishSync({ time: player.currentTime });
            });
        },

        unmuteAndSync() {
            document.getElementById('interaction-shield').style.display = 'none';
            if (player) { 
                player.muted = false; 
                player.volume = 1; 
                player.play().catch(() => {}); 
            }
        },

        sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !this.channel) return;
            
            this.channel.publish('chat', { text });
            this.addChat(this.config.user, text);
            input.value = '';
        },

        addChat(user, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="msg-user">${user}</span> <span></span>`;
            div.querySelector('span:last-child').textContent = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        addSystemMsg(text) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.style.color = '#555';
            div.style.fontSize = '0.65rem';
            div.textContent = `[SYSTEM] ${text}`;
            document.getElementById('chat-messages').appendChild(div);
        },

        toggleChat() {
            const sb = document.querySelector('.sidebar');
            sb.style.display = (sb.style.display === 'none') ? 'flex' : 'none';
        }
    };

    window.onload = () => {
        document.getElementById('init-btn').onclick = () => app.init();
    };
</script>

</body>
</html>
